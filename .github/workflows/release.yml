name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
    
    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        CGO_ENABLED=0 go build -a -installsuffix cgo \
          -ldflags="-X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" \
          -o phpcloud-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/phpcloud
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: phpcloud-${{ matrix.goos }}-${{ matrix.goarch }}
        path: phpcloud-${{ matrix.goos }}-${{ matrix.goarch }}
        retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/phpcloud:${{ github.ref_name }}
          ${{ secrets.DOCKER_USERNAME }}/phpcloud:latest

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: phpcloud-*/phpcloud-*
        generate_release_notes: true
