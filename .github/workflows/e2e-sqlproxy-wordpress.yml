name: E2E Test - SQL Proxy with WordPress Migration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sqlproxy-wordpress-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build PHPCloud image
      run: docker build -t phpcloud:test .
    
    - name: Start WordPress with SQL Proxy
      run: |
        cat > docker-compose.sqlproxy.yml << 'EOF'
        version: '3.8'
        services:
          mysql:
            image: mysql:8.0
            environment:
              MYSQL_ROOT_PASSWORD: rootpass
              MYSQL_DATABASE: wordpress
              MYSQL_USER: wordpress
              MYSQL_PASSWORD: wordpress
            healthcheck:
              test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
              interval: 5s
              timeout: 3s
              retries: 10
          
          wordpress:
            image: wordpress:6.4-php8.2-fpm
            environment:
              WORDPRESS_DB_HOST: phpcloud:3307
              WORDPRESS_DB_USER: wordpress
              WORDPRESS_DB_PASSWORD: wordpress
              WORDPRESS_DB_NAME: wordpress
            depends_on:
              - mysql
              - phpcloud
          
          phpcloud:
            image: phpcloud:test
            ports:
              - "8080:8080"
              - "3307:3307"
            volumes:
              - ./test-config.yaml:/phpcloud/phpcloud.yaml:ro
            depends_on:
              mysql:
                condition: service_healthy
        EOF
        
        cat > test-config.yaml << 'EOF'
        app_profile: generic
        server:
          http_port: 8080
          gossip_port: 7946
          metrics_port: 9090
          read_timeout: 30s
          write_timeout: 120s
          max_request_body: 134217728
        php_fpm:
          socket: tcp://wordpress:9000
          external: true
        session:
          enabled: true
          backend: db
          cookie_name: PHPSESSID
          ttl: 1h
        cluster:
          enabled: false
        migration:
          enabled: true
          lock_key: wordpress:migration
          lock_timeout: 5m
        cron:
          enabled: false
        static_files:
          enabled: false
        maintenance:
          enabled: true
          response_code: 503
          retry_after: 30s
          message: "WordPress is being updated. Please wait..."
        logging:
          level: debug
          format: json
        metrics:
          enabled: true
          path: /metrics
        sql_proxy:
          enabled: true
          listen_addr: "0.0.0.0:3307"
          target_host: "mysql"
          target_port: 3306
        EOF
        
        docker-compose -f docker-compose.sqlproxy.yml up -d
        sleep 60
    
    - name: Test PHPCloud health endpoint
      run: |
        echo "Testing PHPCloud health..."
        curl -s --retry 10 --retry-delay 3 http://localhost:8080/phpcloud/healthz | grep "healthy"
        echo "✅ PHPCloud is healthy"
    
    - name: Test SQL proxy initialization
      run: |
        echo "Checking SQL proxy logs..."
        docker-compose -f docker-compose.sqlproxy.yml logs phpcloud | grep "SQL proxy started"
        echo "✅ SQL proxy initialized"
    
    - name: Install WordPress through SQL proxy
      run: |
        echo "Installing WordPress..."
        curl -s -L -X POST \
          -d "weblog_title=SQLProxyE2E" \
          -d "user_name=admin" \
          -d "admin_password=admin123" \
          -d "admin_password2=admin123" \
          -d "admin_email=admin@test.com" \
          -d "Submit=Install+WordPress" \
          http://localhost:8080/wp-admin/install.php?step=2 | grep "Success"
        echo "✅ WordPress installed through SQL proxy"
    
    - name: Verify WordPress site
      run: |
        echo "Verifying WordPress site..."
        curl -sL http://localhost:8080/ | grep "SQLProxyE2E"
        echo "✅ WordPress site accessible"
    
    - name: Test WordPress login
      run: |
        echo "Testing WordPress login..."
        curl -s -c /tmp/wp_cookies.txt -L \
          -d "log=admin" \
          -d "pwd=admin123" \
          http://localhost:8080/wp-login.php | grep "Dashboard"
        echo "✅ WordPress login working"
    
    - name: Test database connectivity through proxy
      run: |
        echo "Verifying database tables created via proxy..."
        docker-compose -f docker-compose.sqlproxy.yml exec -T mysql \
          mysql -uwordpress -pwordpress wordpress -e "SHOW TABLES;" | grep -E "wp_posts|wp_users|wp_options"
        echo "✅ Database tables created through SQL proxy"
    
    - name: Test migration system
      run: |
        echo "Testing migration system..."
        docker-compose -f docker-compose.sqlproxy.yml logs phpcloud | grep -E "(migration|lock)" | head -5
        echo "✅ Migration system configured"
    
    - name: Test maintenance mode availability
      run: |
        echo "Testing maintenance mode configuration..."
        docker-compose -f docker-compose.sqlproxy.yml logs phpcloud | grep "maintenance"
        echo "✅ Maintenance mode available"
    
    - name: Get logs on failure
      if: failure()
      run: |
        echo "=== PHPCloud Logs ==="
        docker-compose -f docker-compose.sqlproxy.yml logs phpcloud
        echo ""
        echo "=== WordPress Logs ==="
        docker-compose -f docker-compose.sqlproxy.yml logs wordpress
        echo ""
        echo "=== MySQL Logs ==="
        docker-compose -f docker-compose.sqlproxy.yml logs mysql
    
    - name: Cleanup
      if: always()
      run: docker-compose -f docker-compose.sqlproxy.yml down -v
