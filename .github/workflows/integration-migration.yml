name: Integration Test - Migration with Concurrent Users

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  migration-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build PHPCloud image
      run: docker build -t phpcloud:test .
    
    - name: Start WordPress with migration enabled
      run: |
        cat > docker-compose.migration.yml << 'EOF'
        version: '3.8'
        
        services:
          wordpress:
            image: wordpress:6.4-php8.2-fpm
            volumes:
              - wordpress_data:/var/www/html
            environment:
              WORDPRESS_DB_HOST: db:3306
              WORDPRESS_DB_USER: wordpress
              WORDPRESS_DB_PASSWORD: wordpress
              WORDPRESS_DB_NAME: wordpress
            depends_on:
              db:
                condition: service_healthy
          
          db:
            image: mysql:8.0
            environment:
              MYSQL_ROOT_PASSWORD: rootpass
              MYSQL_DATABASE: wordpress
              MYSQL_USER: wordpress
              MYSQL_PASSWORD: wordpress
            healthcheck:
              test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
              interval: 5s
              timeout: 3s
              retries: 10
          
          phpcloud:
            image: phpcloud:test
            ports:
              - "8080:8080"
            volumes:
              - wordpress_data:/var/www/html:ro
              - ./test-config-migration.yaml:/phpcloud/phpcloud.yaml:ro
            depends_on:
              - wordpress
              - db
        
        volumes:
          wordpress_data:
        EOF
        
        cat > test-config-migration.yaml << 'EOF'
        app_profile: generic
        server:
          http_port: 8080
          gossip_port: 7946
          metrics_port: 9090
          read_timeout: 30s
          write_timeout: 120s
          max_request_body: 134217728
        php_fpm:
          socket: tcp://wordpress:9000
          external: true
        session:
          enabled: true
          backend: db
          cookie_name: PHPSESSID
          ttl: 1h
        cluster:
          enabled: false
        migration:
          enabled: true
          lock_key: wordpress:migration
          lock_timeout: 5m
        cron:
          enabled: false
        static_files:
          enabled: true
          extensions:
            - .css
            - .js
            - .png
          root: /var/www/html
        maintenance:
          enabled: true
          response_code: 503
          retry_after: 30s
          message: "WordPress is being updated. Please wait..."
        logging:
          level: debug
          format: json
        metrics:
          enabled: true
          path: /metrics
        EOF
        
        docker-compose -f docker-compose.migration.yml up -d
        sleep 45
    
    - name: Install WordPress
      run: |
        echo "Installing WordPress..."
        curl -s -L -X POST \
          -d "weblog_title=MigrationTest" \
          -d "user_name=admin" \
          -d "admin_password=admin123" \
          -d "admin_password2=admin123" \
          -d "admin_email=admin@test.com" \
          -d "Submit=Install+WordPress" \
          http://localhost:8080/wp-admin/install.php?step=2 | grep "Success"
        echo "✅ WordPress installed"
    
    - name: Create user session
      run: |
        echo "Creating user session..."
        curl -s -c /tmp/wp_session.txt -L \
          -d "log=admin" \
          -d "pwd=admin123" \
          -d "rememberme=forever" \
          http://localhost:8080/wp-login.php | grep "Dashboard"
        
        # Verify session works
        curl -s -b /tmp/wp_session.txt http://localhost:8080/wp-admin/ | grep "Dashboard"
        echo "✅ User session established"
    
    - name: Test migration system
      run: |
        echo "Testing migration system..."
        
        # Check migration logs
        docker-compose -f docker-compose.migration.yml logs phpcloud | grep -E "(migration|lock|Checking)" | head -10
        
        # Verify user still has access after migration check
        curl -s -b /tmp/wp_session.txt http://localhost:8080/wp-admin/ | grep "Dashboard"
        
        echo "✅ Migration system working, user access maintained"
    
    - name: Verify maintenance mode availability
      run: |
        echo "Testing maintenance mode configuration..."
        # The maintenance mode is configured and would activate during actual migrations
        # WordPress handles its own DB updates via wp-admin/update-core.php
        
        # Verify the configuration is loaded
        docker-compose -f docker-compose.migration.yml logs phpcloud | grep "maintenance" || true
        docker-compose -f docker-compose.migration.yml logs phpcloud | grep "migration" | head -5
        
        echo "✅ Maintenance mode configured"
    
    - name: Get logs
      if: always()
      run: |
        echo "=== PHPCloud Migration Logs ==="
        docker-compose -f docker-compose.migration.yml logs phpcloud
    
    - name: Cleanup
      if: always()
      run: docker-compose -f docker-compose.migration.yml down -v
